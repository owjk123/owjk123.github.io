<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZMHJ - Xiao Bao Legend</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: #0a0a1a;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #loading {
            position: absolute;
            z-index: 10;
            color: #e0e0e0;
            text-align: center;
            transition: opacity 0.5s;
        }
        #loading .title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #f6d365, #fda085);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #loading .subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 20px;
        }
        #loading .status {
            font-size: 13px;
            color: #777;
            margin-bottom: 10px;
        }
        #loading .bar-wrap {
            width: 320px;
            height: 3px;
            background: #222;
            border-radius: 2px;
            overflow: hidden;
        }
        #loading .bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #f6d365, #fda085);
            border-radius: 2px;
            transition: width 0.5s;
        }
        #game-container {
            width: 100vw;
            height: calc(100vw * 590 / 940);
            max-height: 100vh;
            max-width: calc(100vh * 940 / 590);
            position: relative;
        }
        #game-container.hidden { opacity: 0; }
        #debug-log {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0,0,0,0.8);
            color: #0f0;
            font-family: monospace;
            font-size: 11px;
            padding: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="title">ZMHJ</div>
        <div class="subtitle">Xiao Bao Legend</div>
        <div class="status" id="load-status">Initializing...</div>
        <div class="bar-wrap"><div class="bar" id="load-bar"></div></div>
    </div>
    <div id="game-container" class="hidden"></div>
    <div id="debug-log"></div>

    <script>
        // Debug logger
        window.dbg = {
            el: null,
            logs: [],
            init: function() {
                this.el = document.getElementById('debug-log');
                // this.el.style.display = 'block'; // Uncomment to show debug
            },
            log: function(msg) {
                var ts = new Date().toISOString().substr(11, 12);
                var line = '[' + ts + '] ' + msg;
                this.logs.push(line);
                if (this.el) this.el.innerHTML = this.logs.slice(-50).join('<br>');
                console.log('[DBG] ' + msg);
            }
        };
        window.dbg.init();

        // Service Worker registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').then(function(reg) {
                window.dbg.log('SW registered: ' + reg.scope);
            }).catch(function(err) {
                window.dbg.log('SW failed: ' + err);
            });
        }

        // Save system
        window.zmhjSave = {
            getSave: function(index) {
                try {
                    var data = localStorage.getItem('zmhj_save_' + index);
                    return data || '';
                } catch(e) { return ''; }
            },
            setSave: function(index, data) {
                try {
                    localStorage.setItem('zmhj_save_' + index, data);
                    return true;
                } catch(e) { return false; }
            },
            getSaveList: function() {
                try {
                    var list = [];
                    for (var i = 0; i < 3; i++) {
                        var data = localStorage.getItem('zmhj_save_' + i);
                        if (data) {
                            list.push({ index: i, datetime: new Date().toISOString().split('T')[0], title: 'Save ' + (i + 1) });
                        }
                    }
                    return JSON.stringify(list);
                } catch(e) { return '[]'; }
            },
            getTime: function() { return Math.floor(Date.now() / 1000).toString(); }
        };

        var loadStatus = document.getElementById('load-status');
        var loadBar = document.getElementById('load-bar');
        var gameContainer = document.getElementById('game-container');
        var loadingDiv = document.getElementById('loading');

        function setStatus(text, pct) {
            loadStatus.textContent = text;
            if (pct !== undefined) loadBar.style.width = pct + '%';
            window.dbg.log('Status: ' + text + (pct !== undefined ? ' (' + pct + '%)' : ''));
        }

        setStatus('Loading Ruffle...', 5);

        // Load Ruffle from CDN
        window.dbg.log('Loading Ruffle from jsdelivr...');
        var script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/@ruffle-rs/ruffle@0.2.0-nightly.2026.5.14/ruffle.js';
        script.onload = function() {
            window.dbg.log('Ruffle script loaded');
            setStatus('Ruffle ready, initializing game...', 20);
            initGame();
        };
        script.onerror = function() {
            window.dbg.log('jsdelivr failed, trying unpkg...');
            setStatus('CDN failed, trying backup...', 5);
            var s2 = document.createElement('script');
            s2.src = 'https://unpkg.com/@ruffle-rs/ruffle@0.2.0-nightly.2026.5.14/ruffle.js';
            s2.onload = function() { 
                window.dbg.log('unpkg loaded');
                initGame(); 
            };
            s2.onerror = function() { 
                window.dbg.log('All CDN failed');
                setStatus('Engine load failed', 0); 
            };
            document.head.appendChild(s2);
        };
        document.head.appendChild(script);

        function initGame() {
            try {
                window.dbg.log('initGame called');
                window.RufflePlayer = window.RufflePlayer || {};
                window.RufflePlayer.config = {
                    "upgradeToHttps": false,
                    "maxExecutionTime": 300,
                    "logLevel": "debug",
                    "autoplay": "on",
                    "openUrlMode": "allow",
                    "allowScriptAccess": true,
                    "backgroundColor": "#0a0a1a",
                    "wmode": "direct"
                };

                window.dbg.log('Creating Ruffle player...');
                var ruffle = RufflePlayer.newest().createPlayer();
                window.dbg.log('Player element created, appending to container...');
                gameContainer.appendChild(ruffle);
                
                setStatus('Loading game resources...', 30);
                
                // Check for canvas periodically
                var checkCount = 0;
                var checkInterval = setInterval(function() {
                    checkCount++;
                    window.dbg.log('Check #' + checkCount + ': Looking for canvas...');
                    
                    // Check shadow root
                    var shadow = ruffle.shadowRoot;
                    if (shadow) {
                        window.dbg.log('Shadow root found');
                        var canvas = shadow.querySelector('canvas');
                        if (canvas) {
                            window.dbg.log('Canvas FOUND! Game loaded successfully!');
                            clearInterval(checkInterval);
                            setStatus('Game loaded!', 100);
                            setTimeout(function() {
                                loadingDiv.style.opacity = '0';
                                gameContainer.classList.remove('hidden');
                                setTimeout(function() { loadingDiv.style.display = 'none'; }, 500);
                            }, 1000);
                        }
                    }
                    
                    // Also check direct children
                    var childCanvas = ruffle.querySelector('canvas');
                    if (childCanvas) {
                        window.dbg.log('Canvas found in direct children!');
                    }
                }, 3000);

                // Fallback: hide loading after 120 seconds
                setTimeout(function() {
                    clearInterval(checkInterval);
                    window.dbg.log('Timeout reached, showing game container');
                    loadingDiv.style.opacity = '0';
                    gameContainer.classList.remove('hidden');
                    setTimeout(function() { loadingDiv.style.display = 'none'; }, 500);
                }, 120000);

                window.dbg.log('Calling ruffle.load(./zmhj.swf)...');
                ruffle.load('./zmhj.swf');

            } catch (e) {
                window.dbg.log('ERROR: ' + e.message);
                setStatus('Error: ' + e.message, 0);
            }
        }
    </script>
</body>
</html>
